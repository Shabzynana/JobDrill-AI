name: Test SSH

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Create .env on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/apps/jobdrill-api

            cat > ~/apps/jobdrill-api/.env <<'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

            echo "Done!"
            ls -la ~/apps/jobdrill-api